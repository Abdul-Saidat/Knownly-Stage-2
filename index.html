<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codely</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <section
      id="hero"
      class="relative text-white px-5 lg:px-20 bg-no-repeat bg-cover bg-center min-h-[100dvh] lg:min-h-screen"
      style="background-image: url(./assest/backgroundImage.jpg)"
    >
      <div class="absolute inset-0 bg-black/75"></div>
      <div class="relative z-10">
        <header>
          <span>logo</span>
        </header>
        <div class="flex flex-col gap-2 justify-center items-center py-40">
          <!-- border: 1px solid; -->

          <!-- border-image-source: linear-gradient(195.8deg, #3176FF 11.63%, #152139 23.24%); -->
          <!-- bg-gradient-to-r  from-[#152139] to-[#3176FF] -->

          <p
            class="text-[14px] px-7 py-3 border rounded-full bg-gradient-to-r from-[#152139] to-[#3176FF] bg-[linear-gradient(195.8deg, #3176FF_11.63%, #152139_23.24%)] bg-transparent"
          >
            Welcome to CodeKovenant
          </p>
          <h1 class="text-[26px] text-center">
            We help businesses to have great impact <span>online</span>
          </h1>
          <p class="mt-2">
            We are a digital agency that ideates, designs, and develops powerful
            software. Leap into the future with a team trusted by the biggest
            brands.
          </p>
          <!-- <p class="text-center"> -->

          <!-- </p> -->
          <div class="cta flex gap-2">
            <button class="border-white rounded-md px-3 py-2 bg-[#152139]">
              Our Services</button
            ><button class="border-white rounded-md p-2 backdrop-blur-3xl">
              Frontend Training
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
